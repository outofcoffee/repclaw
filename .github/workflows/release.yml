name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout openclaw-go SDK
        uses: actions/checkout@v6
        with:
          repository: a3tai/openclaw-go
          path: openclaw-go

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Point go.mod replace at checked-out SDK
        run: go mod edit -replace github.com/a3tai/openclaw-go=./openclaw-go

      - name: Mint Homebrew tap token
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.HOMEBREW_TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: lucinate-ai
          repositories: homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap-token.outputs.token }}

      # Notify the website repo so it can refresh public/latest.json,
      # which the in-app update check fetches on startup. Skip
      # pre-release tags (anything containing "-") so users on the
      # stable channel never see an RC badge.
      - name: Mint website dispatch token
        id: website-token
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBSITE_DISPATCH_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBSITE_DISPATCH_APP_PRIVATE_KEY }}
          owner: lucinate-ai
          repositories: website

      - name: Notify website of new release
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ steps.website-token.outputs.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/lucinate-ai/website/dispatches \
            -f event_type=release-published \
            -f "client_payload[version]=${TAG}"
