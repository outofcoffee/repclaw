name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Startup smoke
        run: make smoke

      - name: GoReleaser (dry run)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean --snapshot --skip=publish
